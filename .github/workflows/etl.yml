name: ETL Pipeline

on:
  workflow_run:
    workflows: ["Biweekly Registration Scrape", "Daily Election Results Scrape"]
    types: [completed]
  workflow_dispatch:

jobs:
  etl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: sudo apt-get install -y libgdal-dev gdal-bin

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run raw voters ETL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m src.etl.load_raw_voters

      - name: Run election results ETL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m src.etl.load_results